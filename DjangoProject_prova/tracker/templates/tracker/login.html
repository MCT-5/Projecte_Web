{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Iniciar Sesión — Deal Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap"
          rel="stylesheet"/>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<div class="back-link">
    <a href="{% url 'home' %}">← Volver al catálogo</a>
</div>

<div class="card">
    <div class="card-logo">
        <div class="logo-icon">🎮</div>
        <span class="logo-text">Deal Tracker</span>
    </div>
    <h2>Iniciar sesión</h2>
    <p class="card-sub">Accede para gestionar tu wishlist y reseñas</p>

    <form method="post">
        {% csrf_token %}
        {% if form.errors %}
            <ul class="errorlist">
                <li>Usuario o contraseña incorrectos.</li>
            </ul>
        {% endif %}
        {{ form.as_p }}
        <button type="submit" class="btn-submit">Entrar →</button>
    </form>

    <div class="card-footer">
        ¿No tienes cuenta? <a href="{% url 'register' %}">Regístrate aquí</a>
    </div>
</div>

</body>
</html>
