{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Editar Wishlist — Deal Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap"
          rel="stylesheet"/>
    <link rel="stylesheet" href="{% static 'css/edit_wishlist_item.css' %}">
</head>
<body>

<div class="back-link">
    <a href="{% url 'my_wishlist' %}">← Volver a mi Wishlist</a>
</div>

<div class="card">
    <div class="card-logo">
        <div class="logo-icon">🎮</div>
        <span class="logo-text">Deal Tracker</span>
    </div>
    <h2>Editar wishlist</h2>
    <p class="card-sub">{{ item.game.title }}</p>

    <form method="post">
        {% csrf_token %}
        <p>
            <label>Precio objetivo (€)</label>
            {{ form.target_price }}
        </p>
        <div class="alert-row">
            {{ form.alert_enabled }}
            <label for="{{ form.alert_enabled.id_for_label }}">Activar alerta cuando baje del precio objetivo</label>
        </div>
        <button type="submit" class="btn-submit">Guardar cambios →</button>
    </form>
</div>

</body>
</html>
