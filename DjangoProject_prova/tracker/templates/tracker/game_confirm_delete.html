{% extends 'base.html' %}
{% block title %}Delete {{ game.title }} — GameDeal{% endblock %}
{% block content %}
<div class="container" style="max-width:480px;margin-top:4rem;">
  <div class="card">
    <div class="card-body">
      <h2 style="color:var(--danger);margin-bottom:.5rem;">🗑 Delete Game</h2>
      <p class="text-muted" style="margin-bottom:1.5rem;">Are you sure you want to delete <strong style="color:var(--text);">{{ object.title }}</strong>? This will also remove all its price listings and wishlist entries.</p>
      <form method="post">
        {% csrf_token %}
        <div class="form-actions">
          <button class="btn-danger" type="submit">Yes, delete</button>
          <a href="{% url 'game_detail' object.pk %}" class="btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
