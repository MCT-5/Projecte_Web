{% extends 'base.html' %}
{% block title %}Remove from Wishlist — GameDeal{% endblock %}
{% block content %}
<div class="container" style="max-width:480px;margin-top:4rem;">
  <div class="card">
    <div class="card-body">
      <h2 style="color:var(--danger);margin-bottom:.5rem;">Remove from Wishlist</h2>
      <p class="text-muted" style="margin-bottom:1.5rem;">Remove <strong style="color:var(--text);">{{ object.game.title }}</strong> from your wishlist?</p>
      <form method="post">{% csrf_token %}
        <div class="form-actions">
          <button class="btn-danger" type="submit">Yes, remove</button>
          <a href="{% url 'my_wishlist' %}" class="btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
