<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Reseña - Deal Tracker</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 40px auto; background: #1f1f1f; padding: 30px; border-radius: 10px; }
        .btn-back { display: inline-block; margin-bottom: 20px; color: #e53e3e; text-decoration: none; font-weight: bold; }
        label { display: block; font-weight: bold; color: #a0aec0; margin-bottom: 5px; }
        input, textarea, select {
            width: 100%; padding: 8px; margin-bottom: 15px;
            border-radius: 4px; border: 1px solid #4a5568; background: #1a1a1a; color: white;
        }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-green { background: #48bb78; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <a href="{% url 'game_detail' review.game.id %}" class="btn-back">← Volver al juego</a>
        <h2 style="color: #e53e3e;">Editar tu reseña de {{ review.game.title }}</h2>

        <form method="post">
            {% csrf_token %}
            <label>Puntuación</label>
            {{ form.rating }}
            <label>Comentario</label>
            {{ form.comment }}
            <button type="submit" class="btn btn-green">Guardar cambios</button>
        </form>
    </div>
</body>
</html>
