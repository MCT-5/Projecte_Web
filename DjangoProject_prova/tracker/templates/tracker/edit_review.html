{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Editar Reseña — Deal Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap"
          rel="stylesheet"/>
    <link rel="stylesheet" href="{% static 'css/edit_review.css' %}">
</head>
<body>

<div class="back-link">
    <a href="{% url 'game_detail' review.game.id %}">← Volver a {{ review.game.title }}</a>
</div>

<div class="card">
    <div class="card-logo">
        <div class="logo-icon">🎮</div>
        <span class="logo-text">Deal Tracker</span>
    </div>
    <h2>Editar reseña</h2>
    <p class="card-sub">{{ review.game.title }}</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-submit">Guardar cambios →</button>
    </form>
</div>

</body>
</html>
