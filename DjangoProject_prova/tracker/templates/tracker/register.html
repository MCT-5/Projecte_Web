<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Deal Tracker</title>
</head>
<body style="background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding-top: 20px;">

    <div style="max-width: 340px; margin: 0 auto; text-align: left; margin-bottom: 20px;">
        <a href="{% url 'home' %}" style="color: #e53e3e; text-decoration: none; font-weight: bold;">← Volver al inicio</a>
    </div>

    <h2>Crear Cuenta</h2>
    <form method="post" style="background: #2d2d2d; padding: 20px; width: 300px; margin: 0 auto; border-radius: 8px;">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="background: #48bb78; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%;">Registrarse</button>
    </form>
    <p>¿Ya tienes cuenta? <a href="{% url 'login' %}" style="color: #63b3ed;">Inicia sesión</a></p>
</body>
</html>
